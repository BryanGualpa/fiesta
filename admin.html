<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de asistencia 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rosa:        #f4a7b9;
      --rosa-dark:   #e07a95;
      --rosa-light:  #fde8ef;
      --rosa-pale:   #fff0f5;
      --lila:        #d8b4e2;
      --lila-light:  #f3e8fa;
      --menta:       #b5ddd8;
      --menta-light: #e8f7f5;
      --crema:       #fdf6f0;
      --text:        #5a3a4a;
      --muted:       #b08a9a;
      --surface:     #ffffff;
      --border:      #f7d6e4;
      --shadow:      0 4px 24px rgba(240,130,160,0.10);
    }
    body {
      background: linear-gradient(135deg, #fde8ef 0%, #f3e8fa 40%, #e8f7f5 100%);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── ACCESO DENEGADO ── */
    #denied { display:none; text-align:center; max-width:360px; margin:8rem auto; background:var(--surface); border-radius:24px; padding:3rem 2rem; box-shadow:var(--shadow); }
    #denied .lock { font-size:3rem; margin-bottom:1rem; }
    #denied h2 { font-family:'Great Vibes',cursive; font-size:2.2rem; color:var(--rosa-dark); margin-bottom:.5rem; }
    #denied p { color:var(--muted); font-size:.9rem; }

    /* ── APP ── */
    #app { display:none; max-width:720px; margin:0 auto; }

    /* ── HEADER ── */
    .page-header {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header-left .eyebrow {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--rosa-dark);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .header-left h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.2rem;
      color: var(--rosa-dark);
      line-height: 1.1;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2d7a5f;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .export-btn {
      background: linear-gradient(135deg, var(--rosa), var(--lila));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .export-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(240,130,160,0.4); }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.2rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.1rem 1rem;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-card .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .lbl { font-size: 11px; color: var(--muted); letter-spacing: .5px; }
    .stat-card.total .num { color: var(--text); }
    .stat-card.si-c  .num { color: #2d7a5f; }
    .stat-card.no-c  .num { color: var(--rosa-dark); }

    /* ── BARRA ── */
    .prog-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow);
    }
    .prog-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
    .prog-track { height:8px; background:var(--rosa-light); border-radius:4px; overflow:hidden; }
    .prog-fill  { height:100%; background:linear-gradient(90deg, #2d7a5f, #4caf86); border-radius:4px; transition:width .6s ease; }

    /* ── BÚSQUEDA Y FILTROS ── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search-wrap { position:relative; }
    .search-wrap input {
      width: 100%;
      padding: 11px 16px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      background: var(--rosa-pale);
      outline: none;
      color: var(--text);
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--rosa); background:#fff; }
    .search-wrap .ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--muted); }

    .filters { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
    }
    .filter-btn:hover { border-color: var(--rosa); color: var(--text); }
    .filter-btn.active { background: linear-gradient(135deg, var(--rosa), var(--lila)); border-color: transparent; color: #fff; }

    /* ── LISTA ── */
    .lista { display:flex; flex-direction:column; gap:8px; }

    .persona {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .9rem 1.1rem;
      box-shadow: 0 1px 8px rgba(240,130,160,0.06);
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

    .persona.si-row { border-left: 3px solid #2d7a5f; }
    .persona.no-row { border-left: 3px solid var(--rosa-dark); }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 14px;
      flex-shrink: 0;
    }
    .avatar.si { background: #edf7f3; color: #2d7a5f; }
    .avatar.no { background: var(--rosa-light); color: var(--rosa-dark); }

    .persona-info { flex:1; min-width:0; }
    .persona-nombre { font-weight:500; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .persona-fecha  { font-size:11px; color:var(--muted); margin-top:1px; }

    .badge {
      font-size: 11px; font-weight: 500;
      padding: 4px 12px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge.si { background: #edf7f3; color: #2d7a5f; border: 1px solid #a8d8c8; }
    .badge.no { background: var(--rosa-light); color: var(--rosa-dark); border: 1px solid #f4a7b9; }

    .empty { text-align:center; padding:3rem 1rem; color:var(--muted); background:var(--surface); border-radius:16px; border:1px solid var(--border); }
    .empty .icon { font-size:2.5rem; margin-bottom:.7rem; }
    .empty p { font-size:.9rem; }
  </style>
</head>
<body>

<div id="denied">
  <div class="lock">🔒</div>
  <h2>Acceso restringido</h2>
  <p>Esta página es solo para el organizador.</p>
</div>

<div id="app">

  <div class="page-header">
    <div class="header-left">
      <div class="eyebrow">🌸 Panel de administrador</div>
      <h1>Lista de asistencia</h1>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="live-txt">Conectando...</span>
      </div>
    </div>
    <button class="export-btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
  </div>

  <div class="stats">
    <div class="stat-card total"><div class="num" id="n-total">—</div><div class="lbl">Total respuestas</div></div>
    <div class="stat-card si-c"> <div class="num" id="n-si">—</div>   <div class="lbl">Asistirán ✓</div></div>
    <div class="stat-card no-c"> <div class="num" id="n-no">—</div>   <div class="lbl">No podrán ir ✕</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-label">
      <span>Porcentaje que asistirá</span>
      <span id="pct-txt">—%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="buscar" placeholder="Buscar por nombre..." oninput="renderLista()"/>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-f="todos" onclick="setFiltro(this)">Todos</button>
      <button class="filter-btn" data-f="si" onclick="setFiltro(this)">✓ Asistirán</button>
      <button class="filter-btn" data-f="no" onclick="setFiltro(this)">✕ No asistirán</button>
    </div>
  </div>

  <div class="lista" id="lista">
    <div class="empty"><div class="icon">🌸</div><p>Cargando datos...</p></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ════════════════════════════════════════════════
  //  CONFIGURACIÓN — mismos datos que index.html
  // ════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey:            "AIzaSyD24pguFCa1X0x4pJ2JaBTJfN9MOoman28",
    authDomain:        "fiesta-84835.firebaseapp.com",
    databaseURL:       "https://fiesta-84835-default-rtdb.firebaseio.com",
    projectId:         "fiesta-84835",
    storageBucket:     "fiesta-84835.firebasestorage.app",
    messagingSenderId: "668059109240",
    appId:             "1:668059109240:web:4557991532e0f099226a8d"
  };

  const TOKEN_ADMIN = "admin2024secret";
  // ════════════════════════════════════════════════

  const params = new URLSearchParams(window.location.search);
  if (params.get("token") !== TOKEN_ADMIN) {
    document.getElementById("denied").style.display = "block";
  } else {
    document.getElementById("app").style.display = "block";
    iniciar();
  }

  let todosLosVotos = [];
  let filtroActivo  = "todos";

  function iniciar() {
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // Escucha en TIEMPO REAL — se actualiza solo cuando alguien vota
    onValue(ref(db, "votos"), (snapshot) => {
      const data = snapshot.val();
      todosLosVotos = data
        ? Object.values(data).sort((a,b) => (b.timestamp||0) - (a.timestamp||0))
        : [];
      actualizarStats();
      renderLista();
      const hora = new Date().toLocaleTimeString("es-EC");
      document.getElementById("live-txt").textContent = `En vivo · ${hora}`;
    }, (error) => {
      document.getElementById("live-txt").textContent = "Error al conectar con Firebase";
      document.getElementById("lista").innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Error: ${error.message}</p></div>`;
    });
  }

  function actualizarStats() {
    const si    = todosLosVotos.filter(v => v.opcion === "si").length;
    const no    = todosLosVotos.filter(v => v.opcion === "no").length;
    const total = todosLosVotos.length;
    const pct   = total ? Math.round(si / total * 100) : 0;
    document.getElementById("n-total").textContent   = total;
    document.getElementById("n-si").textContent      = si;
    document.getElementById("n-no").textContent      = no;
    document.getElementById("pct-txt").textContent   = pct + "%";
    document.getElementById("prog-fill").style.width = pct + "%";
  }

  window.renderLista = function() {
    const busqueda = document.getElementById("buscar").value.toLowerCase().trim();
    let votos = todosLosVotos;
    if (filtroActivo !== "todos") votos = votos.filter(v => v.opcion === filtroActivo);
    if (busqueda) votos = votos.filter(v => v.nombre && v.nombre.toLowerCase().includes(busqueda));

    const lista = document.getElementById("lista");
    if (votos.length === 0) {
      lista.innerHTML = `<div class="empty"><div class="icon">${busqueda?"🔍":"📭"}</div><p>${busqueda?"Sin resultados para esa búsqueda.":"Todavía no hay respuestas."}</p></div>`;
      return;
    }
    lista.innerHTML = votos.map(v => {
      const iniciales = (v.nombre||"?").trim().split(" ").slice(0,2).map(n=>n[0].toUpperCase()).join("");
      const esSi = v.opcion === "si";
      return `
        <div class="persona ${esSi?"si-row":"no-row"}">
          <div class="avatar ${esSi?"si":"no"}">${iniciales}</div>
          <div class="persona-info">
            <div class="persona-nombre">${v.nombre||"Sin nombre"}</div>
            <div class="persona-fecha">${v.fecha||""}</div>
          </div>
          <span class="badge ${esSi?"si":"no"}">${esSi?"🎀 Asistirá":"💌 No asistirá"}</span>
        </div>`;
    }).join("");
  };

  window.setFiltro = function(btn) {
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    filtroActivo = btn.dataset.f;
    renderLista();
  };

  window.exportarCSV = function() {
    if (!todosLosVotos.length) { alert("No hay datos para exportar."); return; }
    const filas = [["Nombre","Respuesta","Fecha"]];
    todosLosVotos.forEach(v => filas.push([
      v.nombre||"",
      v.opcion==="si"?"Sí asistirá":"No asistirá",
      v.fecha||""
    ]));
    const csv  = filas.map(f=>f.map(c=>`"${c}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "asistencia_fiesta.csv"; a.click();
    URL.revokeObjectURL(url);
  };
</script>
</body>
</html>
